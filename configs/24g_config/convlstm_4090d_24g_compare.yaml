data:
  base_root: /root/autodl-tmp/dataset_base/sea_v1
  format: npy_yearly
  root_dir: /root/autodl-tmp/dataset_base/sea_v1
  train_years:
    - 2011
    - 2012
    - 2013
  test_years: [2014]
  input_len: 72
  pred_len: 72
  stride: 6
  cache_size: 16
  train_start: 2011-01-01T00:00:00
  train_main_end: 2013-10-31T23:00:00
  dev_start: 2013-11-01T00:00:00
  dev_end: 2013-12-31T23:00:00
  test_start: 2014-01-01T00:00:00
  test_end: 2014-12-31T23:00:00
  input_features:
    add_mask: true
    add_time_hour: true
    add_time_year: true

model:
  name: convlstm
  hidden_dims: [32, 32]
  kernel_size: 3
  dropout: 0.1

train:
  batch_size: 2
  lr: 0.001
  weight_decay: 0.0001
  epochs: 60
  patience: 5
  num_workers: 4
  device: cuda
  amp: true
  seed: 42
  shuffle_train: false
  output_dir: outputs/compare_24g/convlstm
  max_train_batches:
  max_eval_batches:
  density_physics_loss:
    enabled: true
    weight: 0.01
    rho0: 1027.0
    alpha: 2.0e-4
    beta: 7.5e-4
    t0: 0.0
    s0: 35.0
  smoothness_loss:
    enabled: false
    weight: 0.0
    spatial_weight: 1.0
    temporal_weight: 1.0
  diffdiv_loss:
    enabled: false
    weight: 0.05
    channels: [sst, sss]
    speed_weight: 0.0
  laplacian_smoothness_loss:
    enabled: false
    weight: 0.0
    channels: [sst, sss, speed]

