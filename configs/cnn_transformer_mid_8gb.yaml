data:
  base_root: dataset_base/sea_v1
  root_dir: dataset/娴峰煙瑕佺礌棰勬祴
  train_years:
    - 2011
    - 2012
    - 2013
  test_years: [2014]
  input_len: 72
  pred_len: 72
  stride: 6
  cache_size: 16
  train_start: 2011-01-01T00:00:00
  train_main_end: 2013-10-31T23:00:00
  dev_start: 2013-11-01T00:00:00
  dev_end: 2013-12-31T23:00:00
  test_start: 2014-01-01T00:00:00
  test_end: 2014-12-31T23:00:00
  input_features:
    add_mask: true
    add_time_hour: true
    add_time_year: true

model:
  name: cnn_transformer
  hidden_dim: 64
  num_heads: 4
  num_layers: 2
  ff_dim: 256
  dropout: 0.1
  max_input_len: 128
  max_pred_len: 128

train:
  batch_size: 2
  lr: 0.001
  weight_decay: 0.0001
  epochs: 60
  patience: 4
  num_workers: 2
  device: cuda
  amp: true
  seed: 42
  shuffle_train: false
  output_dir: outputs/train_cnn_transformer_mid_8gb
  max_train_batches:
  max_eval_batches:

