  batch_size: 2
  lr: 0.001
  weight_decay: 0.0001
  epochs: 20
  patience: 5
  num_workers: 2
  device: cuda
  amp: true
  seed: 42
  shuffle_train: false
  output_dir: outputs/cnn_transformer_physics
  max_train_batches:
  max_eval_batches:
  physics_loss:
    enabled: true
    weight: 0.05
    spatial_weight: 1.0
    temporal_weight: 1.0
